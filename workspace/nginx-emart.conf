upstream nodejs_backend {
    server 127.0.0.1:3000;
}

upstream php_fpm {
    server unix:/run/php/php8.2-fpm.sock;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name e-mart.com.bd www.e-mart.com.bd;

    ssl_certificate /etc/letsencrypt/live/e-mart.com.bd/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/e-mart.com.bd/privkey.pem;

    if ($host = "www.e-mart.com.bd") {
        return 301 https://e-mart.com.bd$request_uri;
    }

    if ($host = "5.189.188.229") {
        return 301 https://e-mart.com.bd$request_uri;
    }

    # Block indexing when accessed via an unmatched host on this default server.
    set $noindex "";
    if ($host !~ ^(e-mart\.com\.bd|www\.e-mart\.com\.bd)$) {
        set $noindex "noindex, nofollow";
    }
    add_header X-Robots-Tag $noindex;

    root /var/www/wordpress;
    index index.php index.html index.htm;
    client_max_body_size 64m;

    access_log /var/log/nginx/emart_access.log;
    error_log /var/log/nginx/emart_error.log;

    location /_next/static/ {
        alias /var/www/emart-platform/apps/web/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /public/ {
        alias /var/www/emart-platform/apps/web/public/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location ~* ^/wp-content/uploads/.*\.php$ {
        deny all;
    }

    location /wp-content/uploads/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /wp-content/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /wp-includes/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    location = /wp-admin {
        return 301 https://$host/wp-admin/;
    }

    location = /wp-admin/ {
        rewrite ^ /wp-admin/index.php last;
    }

    location ~ ^/wp-admin/.*\.php$ {
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
        include snippets/fastcgi-php.conf;
        fastcgi_pass php_fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_read_timeout 60s;
    }

    location /wp-admin/ {
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
        try_files $uri $uri/ =404;
    }

    location ~* ^/wp-json/wc/ {
        if ($wc_api_blocked) {
            return 403;
        }
        rewrite ^/wp-json/?(.*)$ /index.php?rest_route=/$1 last;
    }

    location = /wp-json/wp/v2/users {
        return 403;
    }
    location ~ ^/wp-json/wp/v2/users(/|$) {
        return 403;
    }

    # Do not expose the REST API namespace index publicly. Specific REST routes
    # remain available below for the headless storefront, Woo integrations, and
    # Emart API endpoints.
    location = /wp-json {
        return 403;
    }

    location = /wp-json/ {
        return 403;
    }

    location /wp-json/ {
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
        rewrite ^/wp-json/?(.*)$ /index.php?rest_route=/$1 last;
    }
    location ~ ^/graphql/?$ {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
        include fastcgi_params;
        fastcgi_pass php_fpm;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param HTTP_PROXY "";
        fastcgi_read_timeout 60s;
    }


    location = /xmlrpc.php {
        return 403;
    }

    location = /wp-login.php {
        limit_req zone=wplogin burst=3 nodelay;
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
        include snippets/fastcgi-php.conf;
        fastcgi_pass php_fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_read_timeout 60s;
    }

    location ~ ^/(index|xmlrpc)\.php$ {
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
        include snippets/fastcgi-php.conf;
        fastcgi_pass php_fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_read_timeout 60s;
    }

    location ~ ^/(wp-config\.php|wp-load\.php|wp-settings\.php|wp-blog-header\.php)$ {
        deny all;
    }
    # Week 1 slug migrations — permanent 301 redirects
    location = /shop/%e0%a6%a6%e0%a6%be%e0%a6%97-%e0%a6%aa%e0%a6%bf%e0%a6%97%e0%a6%ae%e0%a7%87%e0%a6%a8%e0%a7%8d%e0%a6%9f%e0%a7%87%e0%a6%b6%e0%a6%a8-%e0%a6%93-%e0%a6%a1%e0%a6%be%e0%a6%b0%e0%a7%8d%e0%a6%95-%e0%a6%b8 {
        return 301 https://e-mart.com.bd/shop/beaute-glutathione-skin1004-centella-brightening-combo-2pcs;
    }

    location = /shop/pigmentation-dark-spot-brightening-combo-2pcs {
        return 301 https://e-mart.com.bd/shop/beaute-glutathione-skin1004-centella-brightening-combo-2pcs;
    }

    location = /category/night-crime {
        return 301 https://e-mart.com.bd/category/night-cream;
    }

    location = /contact-us {
        return 301 https://e-mart.com.bd/contact;
    }

    location = /contact-us/ {
        return 301 https://e-mart.com.bd/contact;
    }

    location = /order-tracking {
        return 301 https://e-mart.com.bd/track-order;
    }

    location = /order-tracking/ {
        return 301 https://e-mart.com.bd/track-order;
    }

    location = /homepage {
        return 301 https://e-mart.com.bd/;
    }

    location = /homepage/ {
        return 301 https://e-mart.com.bd/;
    }

    location = /q {
        return 410;
    }

    location = /q/ {
        return 410;
    }

    location = /7-28 {
        return 410;
    }

    location = /7-28/ {
        return 410;
    }

    # ── SkincareBD.com legacy URL patterns ──────────────────────────────

    # Old WooCommerce account pages → Emart account
    location = /my-account                      { return 301 https://e-mart.com.bd/account; }
    location = /my-account/                     { return 301 https://e-mart.com.bd/account; }
    location ~* ^/my-account/                  { return 301 https://e-mart.com.bd/account; }

    # Old about pages → Emart our-story
    location = /about-us                        { return 301 https://e-mart.com.bd/our-story; }
    location = /about-us/                       { return 301 https://e-mart.com.bd/our-story; }
    location = /about                           { return 301 https://e-mart.com.bd/our-story; }
    location = /about/                          { return 301 https://e-mart.com.bd/our-story; }

    # Old brand listing page → Emart brands
    location = /shop-by-brand                   { return 301 https://e-mart.com.bd/brands; }
    location = /shop-by-brand/                  { return 301 https://e-mart.com.bd/brands; }
    location = /brands-list                     { return 301 https://e-mart.com.bd/brands; }
    location = /brands-list/                    { return 301 https://e-mart.com.bd/brands; }

    # WooCommerce tag pages → shop (tags have no Emart equivalent)
    location ~* ^/tag/                         { return 301 https://e-mart.com.bd/shop/; }

    # WordPress author archive pages → home
    location ~* ^/author/                      { return 301 https://e-mart.com.bd/; }

    # Old blog posts → Emart blog index (individual post slugs differ)
    location ~* ^/blog/.+                      { return 301 https://e-mart.com.bd/blog/; }

    # Old WooCommerce checkout received page → order success
    location ~* ^/checkout/order-received/     { return 301 https://e-mart.com.bd/order-success; }

    # ── Truly-gone skincarebd.com products ──────────────────────────────
    # Exact-match blocks win over the regex below — no redirect chain to 404.
    include snippets/skbd-gone-products.conf;

    # Generic Woo product URL → Emart shop (matched products share the same slug)
    location ~ ^/product/([^/]+)/?$ {
        return 301 https://e-mart.com.bd/shop/$1;
    }

    location = /sitemap.xml {
        proxy_pass http://nodejs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Block WordPress Rank Math sitemaps - Next.js sitemap.xml is the only sitemap.
    location ~ ^/(sitemap.*|[^/]+-sitemap[0-9]*)\.xml$ {
        return 301 https://e-mart.com.bd/sitemap.xml;
    }

    location ~* ^/product-category/(.*)$ {
        return 301 https://e-mart.com.bd/category/$1;
    }

    location / {
        proxy_pass http://nodejs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }
}
