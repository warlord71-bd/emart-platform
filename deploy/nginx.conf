# /etc/nginx/sites-available/emart
#
# Fixes 503 on _next/static/ by serving those files directly from disk,
# completely bypassing the Node.js process.  Even if Node crashes the
# browser will still receive CSS / JS chunks.
#
# INSTALL
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/emart
#   sudo ln -sf /etc/nginx/sites-available/emart /etc/nginx/sites-enabled/emart
#   sudo nginx -t && sudo systemctl reload nginx

# Adjust this to wherever the repo lives on the server.
# After `npm run build` the compiled output is at $APP_ROOT/.next/
# Example: /var/www/emart-platform/apps/web
# Override via the EMART_APP_ROOT env var if you use envsubst, or just
# edit the two `alias` lines below.

upstream nextjs_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name e-mart.com.bd www.e-mart.com.bd;

    # ── 1. NEXT.JS STATIC ASSETS ────────────────────────────────────────────
    # Serve these directly from disk.  They are content-hashed so they can be
    # cached forever.  This is the primary fix for the 503 errors: if Node.js
    # is overloaded or restarting, static files still reach the browser.
    location /_next/static/ {
        # IMPORTANT: update this path to match your server deployment path.
        alias /var/www/emart-platform/apps/web/.next/static/;

        # Immutable cache — Next.js hashes file names on every build.
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";

        access_log off;
        gzip_static on;   # serve pre-compressed .gz files when available
    }

    # ── 2. PUBLIC FOLDER ASSETS ─────────────────────────────────────────────
    location /images/ {
        alias /var/www/emart-platform/apps/web/public/images/;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # ── 3. NEXT.JS IMAGE OPTIMISATION ENDPOINT ──────────────────────────────
    # Keep this proxied so Next's image optimizer can run.
    location /_next/image {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── 4. ALL OTHER REQUESTS → NODE.JS ─────────────────────────────────────
    location / {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;

        proxy_set_header Upgrade      $http_upgrade;
        proxy_set_header Connection   'upgrade';
        proxy_set_header Host         $host;
        proxy_set_header X-Real-IP    $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Return a clear error page instead of a blank 502/503 if Node is down.
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

