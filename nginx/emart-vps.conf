upstream nodejs_backend {
    server 127.0.0.1:3000;
}

upstream php_fpm {
    server unix:/run/php/php8.2-fpm.sock;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name 5.189.188.229 e-mart.com.bd www.e-mart.com.bd;

    root /var/www/emart-platform;
    index index.html index.js index.php;

    # ══════════════════════════════════════════════════════════
    # WORDPRESS & WooCommerce API Routes (HIGH PRIORITY)
    # ══════════════════════════════════════════════════════════
    # These must be BEFORE the Node.js catch-all location

    # WordPress API endpoints
    location ~ ^/wp-json/ {
        # Route to PHP-FPM for local WordPress
        root /var/www/wordpress;
        try_files $uri $uri/ /index.php?$args;

        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass php_fpm;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_read_timeout 30s;
        }
    }

    # WordPress admin & login
    location ~ ^/(wp-admin|wp-login\.php) {
        root /var/www/wordpress;
        try_files $uri $uri/ /index.php?$args;

        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass php_fpm;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_read_timeout 30s;
        }
    }

    # WordPress static files
    location ~ ^/wp-content/ {
        root /var/www/wordpress;
        try_files $uri =404;
    }

    # WordPress includes
    location ~ ^/wp-includes/ {
        root /var/www/wordpress;
        try_files $uri =404;
    }

    # Root WordPress files
    location ~ ^/(wp-config\.php|wp-load\.php|wp-settings\.php|wp-blog-header\.php|wp-activate\.php)$ {
        root /var/www/wordpress;
        deny all;
    }

    # ══════════════════════════════════════════════════════════
    # STATIC FILES & ASSETS (Next.js)
    # ══════════════════════════════════════════════════════════

    # Next.js public directory
    location ~* ^/(_next|public|images|static)/ {
        root /var/www/emart-platform/apps/web/.next;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ══════════════════════════════════════════════════════════
    # NEXT.JS APPLICATION (DEFAULT)
    # ══════════════════════════════════════════════════════════
    # This catch-all must be LAST

    location / {
        proxy_pass http://nodejs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ══════════════════════════════════════════════════════════
    # ERROR & ACCESS LOGS
    # ══════════════════════════════════════════════════════════

    access_log /var/log/nginx/emart_access.log;
    error_log /var/log/nginx/emart_error.log;
}
