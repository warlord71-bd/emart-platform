upstream nodejs_backend {
    server 127.0.0.1:3000;
}

upstream php_fpm {
    server unix:/run/php/php8.2-fpm.sock;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name 5.189.188.229 e-mart.com.bd www.e-mart.com.bd;

    root /var/www/wordpress;
    index index.php index.html index.htm;
    client_max_body_size 64m;

    access_log /var/log/nginx/emart_access.log;
    error_log /var/log/nginx/emart_error.log;

    location /_next/static/ {
        alias /var/www/emart-platform/apps/web/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /public/ {
        alias /var/www/emart-platform/apps/web/public/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location ~* ^/wp-content/uploads/.*\.php$ {
        deny all;
    }

    location /wp-content/uploads/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /wp-content/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /wp-includes/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    location = /wp-admin {
        return 301 /wp-admin/;
    }

    location = /wp-admin/ {
        rewrite ^ /wp-admin/index.php last;
    }

    location ~ ^/wp-admin/.*\.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass php_fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_read_timeout 60s;
    }

    location /wp-admin/ {
        try_files $uri $uri/ =404;
    }

    location /wp-json/ {
        rewrite ^/wp-json/?(.*)$ /index.php?rest_route=/$1 last;
    }

    location ~ ^/(index|wp-login|xmlrpc)\.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass php_fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_read_timeout 60s;
    }

    location ~ ^/(wp-config\.php|wp-load\.php|wp-settings\.php|wp-blog-header\.php)$ {
        deny all;
    }

    location / {
        proxy_pass http://nodejs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }
}
