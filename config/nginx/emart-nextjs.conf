# Nginx config reference for e-mart.com.bd
# Live file: /etc/nginx/sites-enabled/emart-nextjs
#
# BUG FIX (2026-05-20): /shop was being intercepted by WordPress before reaching Next.js.
# Root cause: the WordPress proxy_pass block matches broad patterns (e.g. location /) and
# Next.js-managed routes like /shop had no explicit location block to take priority.
#
# Fix: add explicit location blocks for Next.js routes that WordPress was intercepting.
# These must appear BEFORE any WordPress/WooCommerce proxy blocks in the server {} context.
#
# Apply on VPS:
#   1. Edit /etc/nginx/sites-enabled/emart-nextjs
#   2. Add the blocks below before any WordPress location blocks
#   3. nginx -t && systemctl reload nginx
#   4. curl -s https://e-mart.com.bd/shop | grep '<title>'   # must be Next.js title
#
# Next.js runs on port 3000 (pm2 process: emartweb)

server {
    # ... existing SSL/server_name config above this line ...

    # ── Next.js route: /shop ──────────────────────────────────────────────────
    # Explicit block ensures Nginx passes /shop to Next.js (port 3000)
    # instead of falling through to a WordPress proxy_pass block.
    location = /shop {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # /shop/* (product detail pages) — already handled if there's a location /shop/ block;
    # add this if product pages are also being intercepted by WordPress.
    location ^~ /shop/ {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Next.js catch-all (should already exist) ─────────────────────────────
    # If a single location / block proxies to Next.js, the explicit /shop blocks
    # above are still needed because WordPress location blocks may be more specific
    # and take priority over a plain location / { proxy_pass localhost:3000; }.
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ... existing WordPress/WooCommerce proxy blocks AFTER the Next.js blocks above ...
}
